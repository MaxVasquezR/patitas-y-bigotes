<div class="page-shell" *ngIf="!noEncontrado; else noExiste">
  <app-page-header
    titulo="Editar propietario"
    subtitulo="Los cambios se reflejan en todas sus mascotas"
    icono="bi-pencil"
    accionTexto="Volver"
    [accionLink]="['/propietarios', propietarioId]"
    accionIcono="bi-arrow-left"
    accionVariant="outline"
  ></app-page-header>

  <app-form-required-legend></app-form-required-legend>

  <form [formGroup]="form" class="card border-0 shadow-sm" (ngSubmit)="guardar()">
    <div class="card-body p-4">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Nombre <span class="text-danger">*</span></label>
          <input class="form-control" formControlName="nombre" [class.is-invalid]="isInvalid('nombre')" />
        </div>
        <div class="col-md-6">
          <label class="form-label">Apellido <span class="text-danger">*</span></label>
          <input class="form-control" formControlName="apellido" [class.is-invalid]="isInvalid('apellido')" />
        </div>
        <div class="col-md-4">
          <label class="form-label">Tipo documento <span class="text-danger">*</span></label>
          <select class="form-select" formControlName="tipoDocumento">
            <option *ngFor="let t of tiposDocumento" [value]="t">{{ t }}</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">N.º documento <span class="text-danger">*</span></label>
          <input class="form-control" formControlName="numeroDocumento" maxlength="8" [class.is-invalid]="isInvalid('numeroDocumento')" />
          <div class="invalid-feedback d-block">{{ errorMsg('numeroDocumento') }}</div>
        </div>
        <div class="col-md-4">
          <label class="form-label">Distrito <span class="text-danger">*</span></label>
          <input class="form-control" formControlName="distrito" [class.is-invalid]="isInvalid('distrito')" />
        </div>
        <div class="col-md-6">
          <label class="form-label">Teléfono <span class="text-danger">*</span></label>
          <input class="form-control" formControlName="telefono" maxlength="9" [class.is-invalid]="isInvalid('telefono')" />
        </div>
        <div class="col-md-6">
          <label class="form-label">Teléfono alternativo</label>
          <input class="form-control" formControlName="telefonoAlt" maxlength="9" />
        </div>
        <div class="col-md-6">
          <label class="form-label">Email <span class="text-danger">*</span></label>
          <input type="email" class="form-control" formControlName="email" [class.is-invalid]="isInvalid('email')" />
        </div>
        <div class="col-md-6">
          <label class="form-label">Contacto emergencia</label>
          <input class="form-control" formControlName="contactoEmergencia" />
        </div>
        <div class="col-12">
          <label class="form-label">Dirección <span class="text-danger">*</span></label>
          <input class="form-control" formControlName="direccion" [class.is-invalid]="isInvalid('direccion')" />
        </div>
      </div>
    </div>
    <div class="card-footer bg-white d-flex gap-2">
      <button type="submit" class="btn btn-primary">Guardar cambios</button>
      <a [routerLink]="['/propietarios', propietarioId]" class="btn btn-outline-secondary">Cancelar</a>
    </div>
  </form>
</div>

<ng-template #noExiste>
  <div class="page-shell text-center py-5">
    <p class="text-muted">Propietario no encontrado</p>
    <a routerLink="/propietarios" class="btn btn-primary btn-sm">Volver</a>
  </div>
</ng-template>
