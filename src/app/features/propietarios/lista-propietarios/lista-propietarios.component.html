<div class="page-shell">
  <app-page-header
    titulo="Propietarios"
    subtitulo="Directorio de dueños y responsables"
    icono="bi-people"
    accionTexto="Nuevo propietario"
    accionLink="/propietarios/nuevo"
    accionIcono="bi-person-plus"
  ></app-page-header>

  <div class="mb-4">
    <div class="input-group">
      <span class="input-group-text bg-white"><i class="bi bi-search text-muted"></i></span>
      <input
        type="text"
        class="form-control"
        placeholder="Buscar por nombre, teléfono o email..."
        [formControl]="busquedaControl"
      />
    </div>
  </div>

  <div class="card border-0 shadow-sm" *ngIf="propietarios().length > 0; else sinResultados">
    <div class="table-responsive">
      <table class="table table-hover mb-0 align-middle">
        <thead class="table-light">
          <tr>
            <th>Propietario</th>
            <th>Teléfono</th>
            <th>Email</th>
            <th>Dirección</th>
            <th class="text-center">Mascotas</th>
            <th class="text-end">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let p of propietarios(); trackBy: trackByDuenoId" appHighlightHover>
            <td>
              <strong>{{ p.nombre | capitalize }} {{ p.apellido | capitalize }}</strong>
            </td>
            <td>{{ p.telefono | telefono }}</td>
            <td>{{ p.email }}</td>
            <td class="text-muted small">{{ p.direccion }}</td>
            <td class="text-center">
              <span class="badge bg-primary rounded-pill">{{ contarMascotas(p.id) }}</span>
            </td>
            <td class="text-end">
              <a [routerLink]="['/propietarios', p.id]" class="btn btn-sm btn-outline-primary me-1" title="Ver">
                <i class="bi bi-eye"></i>
              </a>
              <a [routerLink]="['/propietarios', p.id, 'editar']" class="btn btn-sm btn-outline-secondary me-1" title="Editar">
                <i class="bi bi-pencil"></i>
              </a>
              <button *appSiPermiso="'eliminar'" class="btn btn-sm btn-outline-danger" (click)="eliminar(p)" title="Eliminar">
                <i class="bi bi-trash"></i>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <ng-template #sinResultados>
    <app-empty-state
      icono="bi-people"
      mensaje="No se encontraron propietarios"
      accionTexto="Registrar primer propietario"
      accionLink="/propietarios/nuevo"
    ></app-empty-state>
  </ng-template>
</div>
