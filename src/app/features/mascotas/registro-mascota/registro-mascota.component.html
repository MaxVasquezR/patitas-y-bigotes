<div class="page-shell">
  <app-page-header
    titulo="Registrar nueva mascota"
    subtitulo="Alta de paciente y vinculación con propietario"
    icono="bi-plus-circle"
    accionTexto="Volver"
    accionLink="/mascotas"
    accionIcono="bi-arrow-left"
    accionVariant="outline"
  ></app-page-header>

  <app-form-required-legend></app-form-required-legend>

  <div class="stepper d-flex align-items-center mb-4">
    <div class="step d-flex align-items-center gap-2" [class.active]="pasoActual === 1" [class.done]="pasoActual > 1">
      <div class="step-num">1</div>
      <span class="d-none d-sm-inline">Datos del paciente</span>
    </div>
    <div class="step-line flex-grow-1 mx-3"></div>
    <div class="step d-flex align-items-center gap-2" [class.active]="pasoActual === 2">
      <div class="step-num">2</div>
      <span class="d-none d-sm-inline">Propietario</span>
    </div>
  </div>

  <form [formGroup]="form" class="card border-0 shadow-sm">
    <div class="card-body p-4">

      <div *ngIf="pasoActual === 1">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Nombre <span class="text-danger">*</span></label>
            <input class="form-control" formControlName="nombre" [class.is-invalid]="isInvalid('nombre')" />
            <div class="invalid-feedback d-block">{{ errorMsg('nombre') }}</div>
          </div>
          <div class="col-md-6">
            <label class="form-label">Especie <span class="text-danger">*</span></label>
            <select class="form-select" formControlName="especie" [class.is-invalid]="isInvalid('especie')">
              <option value="">Seleccionar...</option>
              <option *ngFor="let e of especies" [value]="e">{{ e | titlecase }}</option>
            </select>
          </div>
          <div class="col-md-6" *ngIf="form.get('especie')?.value === 'otro'">
            <label class="form-label">Especifique la especie <span class="text-danger">*</span></label>
            <input class="form-control" formControlName="otraEspecie" [class.is-invalid]="isInvalid('otraEspecie')" />
            <div class="invalid-feedback d-block">{{ errorMsg('otraEspecie') }}</div>
          </div>
          <div class="col-md-6">
            <label class="form-label">Raza <span class="text-danger">*</span></label>
            <input class="form-control" formControlName="raza" [class.is-invalid]="isInvalid('raza')" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Fecha nacimiento <span class="text-danger">*</span></label>
            <input type="date" class="form-control" formControlName="fechaNacimiento" [class.is-invalid]="isInvalid('fechaNacimiento')" />
            <div class="invalid-feedback d-block">{{ errorMsg('fechaNacimiento') }}</div>
          </div>
          <div class="col-md-4">
            <label class="form-label">Sexo <span class="text-danger">*</span></label>
            <select class="form-select" formControlName="sexo" [class.is-invalid]="isInvalid('sexo')">
              <option value="">Seleccionar...</option>
              <option *ngFor="let s of sexos" [value]="s">{{ s | titlecase }}</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label">Peso (kg) <span class="text-danger">*</span></label>
            <input type="number" step="0.1" class="form-control" formControlName="peso" [class.is-invalid]="isInvalid('peso')" />
          </div>
          <div class="col-md-4">
            <label class="form-label">Estado <span class="text-danger">*</span></label>
            <select class="form-select" formControlName="estado">
              <option *ngFor="let e of estados" [value]="e">{{ labelEstado(e) }}</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Color / descripción <span class="text-danger">*</span></label>
            <input class="form-control" formControlName="color" [class.is-invalid]="isInvalid('color')" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Microchip</label>
            <input class="form-control" formControlName="microchip" placeholder="Opcional" />
          </div>
          <div class="col-12">
            <label class="form-label">Alergias conocidas</label>
            <textarea class="form-control" rows="2" formControlName="alergias" placeholder="Ninguna / detalle"></textarea>
          </div>
          <div class="col-12">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" formControlName="castrado" id="castrado" />
              <label class="form-check-label" for="castrado">Paciente castrado/esterilizado</label>
            </div>
          </div>
        </div>
        <div class="d-flex justify-content-end mt-4">
          <button type="button" class="btn btn-primary" (click)="siguiente()">Siguiente <i class="bi bi-arrow-right ms-1"></i></button>
        </div>
      </div>

      <div *ngIf="pasoActual === 2">
        <div class="mb-3">
          <label class="form-label fw-semibold">Tipo de registro de propietario</label>
          <div class="btn-group w-100" role="group">
            <input type="radio" class="btn-check" formControlName="dueno_modo" value="existente" id="modoExistente" />
            <label class="btn btn-outline-primary" for="modoExistente">Propietario existente</label>
            <input type="radio" class="btn-check" formControlName="dueno_modo" value="nuevo" id="modoNuevo" />
            <label class="btn btn-outline-primary" for="modoNuevo">Nuevo propietario</label>
          </div>
        </div>

        <div *ngIf="modoDueno() === 'existente'" class="mb-4">
          <label class="form-label">Seleccionar propietario <span class="text-danger">*</span></label>
          <select class="form-select" formControlName="dueno_id" (change)="onDuenoSeleccionado()" [class.is-invalid]="isInvalid('dueno_id')">
            <option value="">Buscar en directorio...</option>
            <option *ngFor="let p of propietarios" [value]="p.id">
              {{ p.nombre }} {{ p.apellido }} — DNI {{ p.numeroDocumento }} — {{ p.telefono }}
            </option>
          </select>
        </div>

        <div *ngIf="modoDueno() === 'nuevo'" class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Nombre <span class="text-danger">*</span></label>
            <input class="form-control" formControlName="dueno_nombre" [class.is-invalid]="isInvalid('dueno_nombre')" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Apellido <span class="text-danger">*</span></label>
            <input class="form-control" formControlName="dueno_apellido" [class.is-invalid]="isInvalid('dueno_apellido')" />
          </div>
          <div class="col-md-4">
            <label class="form-label">N.º documento <span class="text-danger">*</span></label>
            <input class="form-control" formControlName="dueno_numeroDocumento" maxlength="8" [class.is-invalid]="isInvalid('dueno_numeroDocumento')" />
          </div>
          <div class="col-md-4">
            <label class="form-label">Distrito <span class="text-danger">*</span></label>
            <input class="form-control" formControlName="dueno_distrito" [class.is-invalid]="isInvalid('dueno_distrito')" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Teléfono <span class="text-danger">*</span></label>
            <input class="form-control" formControlName="dueno_telefono" maxlength="9" [class.is-invalid]="isInvalid('dueno_telefono')" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" formControlName="dueno_email" [class.is-invalid]="isInvalid('dueno_email')" />
          </div>
          <div class="col-12">
            <label class="form-label">Dirección <span class="text-danger">*</span></label>
            <input class="form-control" formControlName="dueno_direccion" [class.is-invalid]="isInvalid('dueno_direccion')" />
          </div>
        </div>

        <div class="d-flex justify-content-between mt-4">
          <button type="button" class="btn btn-outline-secondary" (click)="anterior()"><i class="bi bi-arrow-left me-1"></i>Anterior</button>
          <button type="button" class="btn btn-primary" (click)="guardar()"><i class="bi bi-check-lg me-1"></i>Registrar mascota</button>
        </div>
      </div>
    </div>
  </form>
</div>
