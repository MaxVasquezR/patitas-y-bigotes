<div class="page-shell">
  <app-page-header
    titulo="Registrar usuario"
    subtitulo="Alta de personal con acceso al sistema"
    icono="bi-person-plus"
    accionTexto="Volver"
    accionLink="/usuarios"
    accionIcono="bi-arrow-left"
    accionVariant="outline"
  ></app-page-header>

  <app-form-required-legend></app-form-required-legend>

  <form [formGroup]="form" class="card border-0 shadow-sm" (ngSubmit)="guardar()">
    <div class="card-body p-4">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Username <span class="text-danger">*</span></label>
          <input class="form-control" formControlName="username" [class.is-invalid]="isInvalid('username')" />
          <div class="invalid-feedback d-block">{{ errorMsg('username') }}</div>
        </div>
        <div class="col-md-6">
          <label class="form-label">Nombre completo <span class="text-danger">*</span></label>
          <input class="form-control" formControlName="nombre" [class.is-invalid]="isInvalid('nombre')" />
          <div class="invalid-feedback d-block">{{ errorMsg('nombre') }}</div>
        </div>
        <div class="col-md-6">
          <label class="form-label">Contraseña <span class="text-danger">*</span></label>
          <input type="password" class="form-control" formControlName="password" [class.is-invalid]="isInvalid('password')" />
          <div class="invalid-feedback d-block">{{ errorMsg('password') }}</div>
        </div>
        <div class="col-md-6">
          <label class="form-label">Rol <span class="text-danger">*</span></label>
          <select class="form-select" formControlName="rol">
            <option value="asistente">Asistente</option>
            <option value="admin">Administrador</option>
          </select>
        </div>
      </div>
      <div class="d-flex justify-content-end mt-4">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-lg me-1"></i>Registrar usuario
        </button>
      </div>
    </div>
  </form>
</div>
