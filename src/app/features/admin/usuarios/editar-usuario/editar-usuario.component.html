<div class="page-shell" *ngIf="!noEncontrado; else noExiste">
  <app-page-header
    titulo="Editar usuario"
    subtitulo="Actualizar datos de acceso y rol"
    icono="bi-pencil"
    accionTexto="Volver"
    accionLink="/usuarios"
    accionIcono="bi-arrow-left"
    accionVariant="outline"
  ></app-page-header>

  <app-form-required-legend></app-form-required-legend>

  <form [formGroup]="form" class="card border-0 shadow-sm" (ngSubmit)="guardar()">
    <div class="card-body p-4">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Username <span class="text-danger">*</span></label>
          <input class="form-control" formControlName="username" [class.is-invalid]="isInvalid('username')" />
          <div class="invalid-feedback d-block">{{ errorMsg('username') }}</div>
        </div>
        <div class="col-md-6">
          <label class="form-label">Nombre completo <span class="text-danger">*</span></label>
          <input class="form-control" formControlName="nombre" [class.is-invalid]="isInvalid('nombre')" />
          <div class="invalid-feedback d-block">{{ errorMsg('nombre') }}</div>
        </div>
        <div class="col-md-6">
          <label class="form-label">Contraseña <span class="text-muted">(dejar en blanco para no cambiar)</span></label>
          <input type="password" class="form-control" formControlName="password" [class.is-invalid]="isInvalid('password')" />
          <div class="invalid-feedback d-block">{{ errorMsg('password') }}</div>
        </div>
        <div class="col-md-6">
          <label class="form-label">Rol <span class="text-danger">*</span></label>
          <select class="form-select" formControlName="rol">
            <option value="asistente">Asistente</option>
            <option value="admin">Administrador</option>
          </select>
        </div>
        <div class="col-12">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" formControlName="activo" id="activo" />
            <label class="form-check-label" for="activo">Usuario activo (puede iniciar sesión)</label>
          </div>
        </div>
      </div>
    </div>
    <div class="card-footer bg-white d-flex gap-2">
      <button type="submit" class="btn btn-primary">Guardar cambios</button>
      <a routerLink="/usuarios" class="btn btn-outline-secondary">Cancelar</a>
    </div>
  </form>
</div>

<ng-template #noExiste>
  <div class="page-shell text-center py-5">
    <p class="text-muted">Usuario no encontrado</p>
    <a routerLink="/usuarios" class="btn btn-primary btn-sm">Volver</a>
  </div>
</ng-template>
