<div class="page-shell" *ngIf="!noEncontrada; else noExiste">
  <app-page-header
    titulo="Editar cita"
    subtitulo="Modificar programación o estado"
    icono="bi-pencil-square"
    accionTexto="Volver"
    accionLink="/citas"
    accionIcono="bi-arrow-left"
    accionVariant="outline"
  ></app-page-header>

  <form [formGroup]="form" class="card border-0 shadow-sm" (ngSubmit)="guardar()">
    <div class="card-body p-4">
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label">Mascota *</label>
          <select class="form-select" formControlName="mascotaId" [class.is-invalid]="isInvalid('mascotaId')">
            <option value="">Seleccionar...</option>
            <option *ngFor="let m of mascotas" [value]="m.id">
              {{ m.nombre }} — {{ m.dueno.nombre }} {{ m.dueno.apellido }}
            </option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Fecha *</label>
          <input type="date" class="form-control" formControlName="fecha" [class.is-invalid]="isInvalid('fecha')" />
        </div>
        <div class="col-md-4">
          <label class="form-label">Hora *</label>
          <select class="form-select" formControlName="hora" [class.is-invalid]="isInvalid('hora')">
            <option value="">Seleccionar...</option>
            <option *ngFor="let h of horas" [value]="h">{{ h }}</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Estado *</label>
          <select class="form-select" formControlName="estado" [class.is-invalid]="isInvalid('estado')">
            <option *ngFor="let e of estados" [value]="e">{{ e | titlecase }}</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Tipo *</label>
          <select class="form-select" formControlName="tipo" [class.is-invalid]="isInvalid('tipo')">
            <option *ngFor="let t of tipos" [value]="t">{{ t | titlecase }}</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Veterinario *</label>
          <select class="form-select" formControlName="veterinario" [class.is-invalid]="isInvalid('veterinario')">
            <option *ngFor="let v of veterinarios" [value]="v">{{ v }}</option>
          </select>
        </div>
        <div class="col-12">
          <label class="form-label">Motivo *</label>
          <textarea class="form-control" rows="2" formControlName="motivo" [class.is-invalid]="isInvalid('motivo')"></textarea>
        </div>
        <div class="col-12">
          <label class="form-label">Notas</label>
          <textarea class="form-control" rows="2" formControlName="notas"></textarea>
        </div>
      </div>
    </div>
    <div class="card-footer bg-white d-flex gap-2">
      <button type="submit" class="btn btn-primary">Guardar</button>
      <a routerLink="/citas" class="btn btn-outline-secondary">Cancelar</a>
    </div>
  </form>
</div>

<ng-template #noExiste>
  <div class="page-shell text-center py-5">
    <p class="text-muted">Cita no encontrada</p>
    <a routerLink="/citas" class="btn btn-primary btn-sm">Volver</a>
  </div>
</ng-template>
